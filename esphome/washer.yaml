  # Set to "false" to expose debug metrics for tuning.
  debug_metrics_internal: "true"

esphome:
  name: washer

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "ZoHWjRKrWxdsUSPFN0sqErd7nf9+txg+QqrwBQTCtX8="

ota:
  - platform: esphome
    password: "lrwasher1181"

wifi:
  ssid: "GrenoblePirates-2G"
  password: !secret wifi_password

