substitutions:
  # Set to "true" to hide all debug metrics from Home Assistant.
  # Set to "false" to expose debug metrics for tuning.
  debug_metrics_internal: "true"

esphome:
  name: washer

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "ZoHWjRKrWxdsUSPFN0sqErd7nf9+txg+QqrwBQTCtX8="

ota:
  - platform: esphome
    password: "lrwasher1181"

wifi:
  ssid: "GrenoblePirates-2G"
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Washer-Fallback-Hotspot"
    password: "3lLFj9SszhOa"

# Example configuration entry
web_server:
  port: 8080

captive_portal:

i2c:
  sda: GPIO3
  scl: GPIO4
  scan: true

globals:
  - id: washer_accel_baseline
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: dryer_coupling_compensation_factor
    type: float
    restore_value: yes
    initial_value: '0.75'
  - id: washer_micro_effective_trigger
    type: float
    restore_value: yes
    initial_value: '0.30'
  - id: washer_large_vibration_trigger
    type: float
    restore_value: yes
    initial_value: '0.80'
  - id: dryer_accel_baseline
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: baselines_initialized
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: dryer_cycle_started
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: washer_cycle_started
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: dryer_cycle_start_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: washer_cycle_start_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: washer_last_activity_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

interval:
  - interval: 1s
    then:
      - lambda: |-
          const float alpha = 0.03f;

          if (!id(washer_combined_acceleration_raw).has_state() || !id(dryer_combined_acceleration_raw).has_state()) {
            return;
          }

          const float w = id(washer_combined_acceleration_raw).state;
          const float d = id(dryer_combined_acceleration_raw).state;

          if (isnan(w) || isnan(d)) {
            return;
          }

          if (!id(baselines_initialized)) {
            id(washer_accel_baseline) = w;
            id(dryer_accel_baseline) = d;
            id(baselines_initialized) = true;
            return;
          }

          // Learn each baseline independently when that machine is off.
          const bool washer_on = id(washer_on_sensor).has_state() && id(washer_on_sensor).state;
          const bool dryer_on = id(dryer_on_sensor).has_state() && id(dryer_on_sensor).state;

          if (!washer_on) {
            id(washer_accel_baseline) = id(washer_accel_baseline) * (1.0f - alpha) + w * alpha;
          }
          if (!dryer_on) {
            id(dryer_accel_baseline) = id(dryer_accel_baseline) * (1.0f - alpha) + d * alpha;
          }

sensor:
  - platform: mpu6050
    address: 0x68
    update_interval: 1s
    accel_x:
      id: washer_accel_x # Add id for referencing
      name: "Washer Accel X"
      internal: true
      filters:
      - offset: -9.90 # Adjust this value as needed
    accel_y:
      id: washer_accel_y # Add id for referencing
      name: "Washer Accel Y"
      internal: true
      filters:
      - offset: -1.7 # Adjust this value as needed
    accel_z:
      id: washer_accel_z # Add id for referencing
      name: "Washer Accel Z"
      internal: true
      filters:
      - offset: -0.23 # Adjust this value as needed
    gyro_x:
      id: washer_gyro_x # Add id for referencing
      name: "Washer Gyro X"
      internal: true
      filters:
      - offset: 2.07 # Adjust this value as needed
    gyro_y:
      id: washer_gyro_y # Add id for referencing
      name: "Washer Gyro Y"
      internal: true
      filters:
      - offset: 0 # Adjust this value as needed
    gyro_z:
      id: washer_gyro_z # Add id for referencing
      name: "Washer Gyro Z"
      internal: true
      filters:
      - offset: 0.73 # Adjust this value as needed

  - platform: template
    id: washer_combined_gyro # Add an id here if it doesn't have one
    name: "Washer Combined Gyro"
    unit_of_measurement: "°/s"
    icon: "mdi:rotate-3d-variant"
    lambda: |-
      return abs(id(washer_gyro_x).state) + abs(id(washer_gyro_y).state) + abs(id(washer_gyro_z).state);
    update_interval: 1s
    filters:
      # - sliding_window_moving_average:
      #     window_size: 15
      #     send_every: 15
      #     send_first_at: 1
      - max:
          window_size: 10
          send_every: 10


  - platform: template
    id: washer_combined_acceleration_raw
    name: "Washer Combined Acceleration Raw"
    internal: true
    unit_of_measurement: "m/s²"
    icon: "mdi:axis-arrow"
    lambda: |-
      return sqrt(pow(id(washer_accel_x).state, 2) + pow(id(washer_accel_y).state, 2) + pow(id(washer_accel_z).state, 2));
    update_interval: 1s

  - platform: template
    name: "Washer Combined Acceleration"
    id: washer_combined_acceleration # Add an id here if it doesn't have one
    unit_of_measurement: "m/s²"
    icon: "mdi:axis-arrow"
    lambda: |-
      return sqrt(pow(id(washer_accel_x).state, 2) + pow(id(washer_accel_y).state, 2) + pow(id(washer_accel_z).state, 2));
    update_interval: 1s
    filters:
      # - sliding_window_moving_average:
      #     window_size: 15
      #     send_every: 15
      #     send_first_at: 1      
      - max:
          window_size: 10
          send_every: 10

  - platform: mpu6050
    address: 0x69
    update_interval: 1s
    accel_x:
      id: dryer_accel_x # Add id for referencing
      name: "Dryer Accel X"
      internal: true
      filters:
      - offset: 9.36 # Adjust this value as needed
    accel_y:
      id: dryer_accel_y # Add id for referencing
      name: "Dryer Accel Y"
      internal: true
      filters:
      - offset: 1.28 # Adjust this value as needed
    accel_z:
      id: dryer_accel_z # Add id for referencing
      name: "Dryer Accel Z"
      internal: true
      filters:
      - offset: 0.27 # Adjust this value as needed
    gyro_x:
      name: "Dryer Gyro X"
      internal: true
      filters:
      - offset: -3.17 # Adjust this value as needed
    gyro_y:
      name: "Dryer Gyro Y"
      internal: true
      filters:
      - offset: 0.12 # Adjust this value as needed
    gyro_z:
      name: "Dryer Gyro Z"
      internal: true
      filters:
      - offset: 0.98 # Adjust this value as needed
      

  - platform: template
    id: dryer_combined_acceleration_raw
    name: "Dryer Combined Acceleration Raw"
    internal: true
    unit_of_measurement: "m/s²"
    icon: "mdi:axis-arrow"
    lambda: |-
      return sqrt(pow(id(dryer_accel_x).state, 2) + pow(id(dryer_accel_y).state, 2) + pow(id(dryer_accel_z).state, 2));
    update_interval: 1s

  - platform: template
    id: dryer_combined_acceleration # Add an id here  
    name: "Dryer Combined Acceleration"
    unit_of_measurement: "m/s²"
    icon: "mdi:axis-arrow"
    lambda: |-
      return sqrt(pow(id(dryer_accel_x).state, 2) + pow(id(dryer_accel_y).state, 2) + pow(id(dryer_accel_z).state, 2));
    update_interval: 1s
    filters:
      # - sliding_window_moving_average:
      #     window_size: 15
      #     send_every: 15
      #     send_first_at: 1
      - max:
          window_size: 10
          send_every: 10

  - platform: template
    id: washer_micro_vibrations
    name: "Washer Micro Vibrations"
    unit_of_measurement: "m/s²"
    icon: "mdi:vibrate-off"
    lambda: |-
      if (!id(washer_combined_acceleration_raw).has_state()) {
        return 0.0f;
      }
      if (isnan(id(washer_accel_baseline))) {
        return 0.0f;
      }
      const float delta = id(washer_combined_acceleration_raw).state - id(washer_accel_baseline);
      return delta > 0.0f ? delta : 0.0f;
    update_interval: 1s
    filters:
      - max:
          window_size: 2
          send_every: 2

  - platform: template
    id: washer_large_vibrations
    name: "Washer Large Vibrations"
    unit_of_measurement: "m/s²"
    icon: "mdi:vibrate"
    lambda: |-
      if (!id(washer_combined_acceleration_raw).has_state()) {
        return 0.0f;
      }
      if (isnan(id(washer_accel_baseline))) {
        return 0.0f;
      }
      const float delta = id(washer_combined_acceleration_raw).state - id(washer_accel_baseline);
      return delta > 0.0f ? delta : 0.0f;
    update_interval: 1s
    filters:
      - max:
          window_size: 10
          send_every: 10

  - platform: template
    id: dryer_micro_vibrations
    name: "Dryer Micro Vibrations"
    unit_of_measurement: "m/s²"
    icon: "mdi:vibrate-off"
    lambda: |-
      if (!id(dryer_combined_acceleration_raw).has_state()) {
        return 0.0f;
      }
      if (isnan(id(dryer_accel_baseline))) {
        return 0.0f;
      }
      const float delta = id(dryer_combined_acceleration_raw).state - id(dryer_accel_baseline);
      return delta > 0.0f ? delta : 0.0f;
    update_interval: 1s
    filters:
      - max:
          window_size: 2
          send_every: 2

  - platform: template
    id: dryer_large_vibrations
    name: "Dryer Large Vibrations"
    unit_of_measurement: "m/s²"
    icon: "mdi:vibrate"
    lambda: |-
      if (!id(dryer_combined_acceleration_raw).has_state()) {
        return 0.0f;
      }
      if (isnan(id(dryer_accel_baseline))) {
        return 0.0f;
      }
      const float delta = id(dryer_combined_acceleration_raw).state - id(dryer_accel_baseline);
      return delta > 0.0f ? delta : 0.0f;
    update_interval: 1s
    filters:
      - max:
          window_size: 10
          send_every: 10

  - platform: template
    id: debug_washer_dryer_coupling_subtraction
    name: "Debug Washer Dryer Coupling Subtraction"
    internal: ${debug_metrics_internal}
    disabled_by_default: false
    entity_category: diagnostic
    unit_of_measurement: "m/s²"
    icon: "mdi:minus-circle-outline"
    lambda: |-
      if (!id(dryer_micro_vibrations).has_state()) {
        return 0.0f;
      }
      return id(dryer_micro_vibrations).state * id(dryer_coupling_compensation_factor);
    update_interval: 1s

  - platform: template
    id: debug_washer_micro_vibration_effective
    name: "Debug Washer Micro Vibration Effective"
    internal: ${debug_metrics_internal}
    disabled_by_default: false
    entity_category: diagnostic
    unit_of_measurement: "m/s²"
    icon: "mdi:tune-variant"
    lambda: |-
      if (!id(washer_micro_vibrations).has_state() || !id(dryer_micro_vibrations).has_state()) {
        return 0.0f;
      }
      const float wm = id(washer_micro_vibrations).state;
      const float dm = id(dryer_micro_vibrations).state;
      const float wm_comp = wm - (dm * id(dryer_coupling_compensation_factor));
      return wm_comp > 0.0f ? wm_comp : 0.0f;
    update_interval: 1s

  - platform: template
    id: debug_washer_micro_trigger_margin
    name: "Debug Washer Micro Trigger Margin"
    internal: ${debug_metrics_internal}
    disabled_by_default: false
    entity_category: diagnostic
    unit_of_measurement: "m/s²"
    icon: "mdi:chart-line-variant"
    lambda: |-
      if (!id(debug_washer_micro_vibration_effective).has_state()) {
        return 0.0f;
      }
      return id(debug_washer_micro_vibration_effective).state - id(washer_micro_effective_trigger);
    update_interval: 1s

  - platform: template
    id: debug_washer_large_trigger_margin
    name: "Debug Washer Large Trigger Margin"
    internal: ${debug_metrics_internal}
    disabled_by_default: false
    entity_category: diagnostic
    unit_of_measurement: "m/s²"
    icon: "mdi:chart-line-variant"
    lambda: |-
      if (!id(washer_large_vibrations).has_state()) {
        return 0.0f;
      }
      return id(washer_large_vibrations).state - id(washer_large_vibration_trigger);
    update_interval: 1s

  - platform: template
    id: debug_washer_tuning_compensation_factor_sensor
    name: "Debug Washer Tuning Compensation Factor"
    internal: ${debug_metrics_internal}
    disabled_by_default: false
    entity_category: diagnostic
    icon: "mdi:knob"
    lambda: |-
      return id(dryer_coupling_compensation_factor);
    update_interval: 10s

  - platform: template
    id: debug_washer_tuning_micro_trigger_sensor
    name: "Debug Washer Tuning Micro Trigger"
    internal: ${debug_metrics_internal}
    disabled_by_default: false
    entity_category: diagnostic
    unit_of_measurement: "m/s²"
    icon: "mdi:knob"
    lambda: |-
      return id(washer_micro_effective_trigger);
    update_interval: 10s

  - platform: template
    id: debug_washer_tuning_large_trigger_sensor
    name: "Debug Washer Tuning Large Trigger"
    internal: ${debug_metrics_internal}
    disabled_by_default: false
    entity_category: diagnostic
    unit_of_measurement: "m/s²"
    icon: "mdi:knob"
    lambda: |-
      return id(washer_large_vibration_trigger);
    update_interval: 10s

  - platform: template
    id: washer_accel_baseline_sensor
    name: "Washer Accel Baseline"
    unit_of_measurement: "m/s²"
    icon: "mdi:chart-bell-curve"
    lambda: |-
      if (isnan(id(washer_accel_baseline))) {
        return 0.0f;
      }
      return id(washer_accel_baseline);
    update_interval: 5s

  - platform: template
    id: dryer_accel_baseline_sensor
    name: "Dryer Accel Baseline"
    unit_of_measurement: "m/s²"
    icon: "mdi:chart-bell-curve"
    lambda: |-
      if (isnan(id(dryer_accel_baseline))) {
        return 0.0f;
      }
      return id(dryer_accel_baseline);
    update_interval: 5s



binary_sensor:
  - platform: template
    name: "Dryer On"
    id: dryer_on_sensor
    trigger_on_initial_state: true
    device_class: running # Optional: for better representation in Home Assistant
    lambda: |-
      const uint32_t min_cycle_ms = 20UL * 60UL * 1000UL;
      const uint32_t now = millis();

      if (!id(dryer_large_vibrations).has_state() || !id(dryer_micro_vibrations).has_state() ||
          !id(washer_large_vibrations).has_state() || !id(washer_micro_vibrations).has_state()) {
        return false;
      }

      const float dl = id(dryer_large_vibrations).state;
      const float dm = id(dryer_micro_vibrations).state;
      const float wl = id(washer_large_vibrations).state;
      const float wm = id(washer_micro_vibrations).state;

      // Suppress dryer ON when washer clearly dominates the shared vibration.
      const bool coupled_from_washer = (wl >= 0.8f && wm >= 0.45f && wl > (dl * 1.2f));
      const bool strong_start = (dl >= 0.9f && dm >= 0.5f) && !coupled_from_washer;

      if (!id(dryer_cycle_started) && strong_start) {
        id(dryer_cycle_started) = true;
        id(dryer_cycle_start_ms) = now;
      }

      if (id(dryer_cycle_started)) {
        if ((uint32_t) (now - id(dryer_cycle_start_ms)) < min_cycle_ms) {
          return true;
        }
        if (!strong_start) {
          id(dryer_cycle_started) = false;
        }
      }

      if (strong_start) {
        return true;
      } else {
        return false;
      }
    filters:
      - delayed_on: 30s
      - delayed_off: 2min          

  - platform: template
    name: "Accel Flag 1"
    id: washer_accel_flag_1
    trigger_on_initial_state: true
    device_class: running # Optional
    lambda: |-
      if (!id(washer_large_vibrations).has_state() || !id(washer_micro_vibrations).has_state() ||
          !id(dryer_large_vibrations).has_state() || !id(dryer_micro_vibrations).has_state()) {
        return false;
      }

      const float wl = id(washer_large_vibrations).state;
      const float wm = id(washer_micro_vibrations).state;
      const float dl = id(dryer_large_vibrations).state;
      const float dm = id(dryer_micro_vibrations).state;
      // Remove shared vibration from dryer before checking washer micro activity.
      const float wm_comp = wm - (dm * id(dryer_coupling_compensation_factor));
      const float wm_effective = wm_comp > 0.0f ? wm_comp : 0.0f;

      // Suppress washer accel flag when dryer clearly dominates shared vibration.
      if (dl >= 0.9f && dm >= 0.5f && dl > (wl * 1.2f)) {
        return false;
      }

      if (wl >= id(washer_large_vibration_trigger) && wm_effective >= id(washer_micro_effective_trigger)) {
        return true;
      } else {
        return false;
      }
    filters:
      - delayed_on: 30s

  - platform: template
    name: "Gyro Flag 1"
    id: washer_gyro_flag_1
    trigger_on_initial_state: true
    device_class: running # Optional
    lambda: |-
      if (!id(washer_large_vibrations).has_state() || !id(dryer_large_vibrations).has_state() || !id(dryer_micro_vibrations).has_state() || !id(washer_combined_gyro).has_state()) {
        return false;
      }
      const float wl = id(washer_large_vibrations).state;
      const float dl = id(dryer_large_vibrations).state;
      const float dm = id(dryer_micro_vibrations).state;

      // Suppress washer gyro flag when dryer clearly dominates shared vibration.
      if (dl >= 0.9f && dm >= 0.5f && dl > (wl * 1.2f)) {
        return false;
      }

      if (id(washer_combined_gyro).state >= 0.8f) {
        return true;
      } else {
        return false;
      }
    filters:
      - delayed_on: 30s
      
  - platform: template
    name: "Washer On"
    id: washer_on_sensor
    trigger_on_initial_state: true
    device_class: running # Optional
    lambda: |-
      const uint32_t min_cycle_ms = 20UL * 60UL * 1000UL;
      const uint32_t inter_phase_hold_ms = 8UL * 60UL * 1000UL;
      const uint32_t now = millis();

      if (!id(washer_accel_flag_1).has_state() || !id(washer_gyro_flag_1).has_state()) {
        return false;
      }

      const float wm = id(washer_micro_vibrations).has_state() ? id(washer_micro_vibrations).state : 0.0f;
      const float wl = id(washer_large_vibrations).has_state() ? id(washer_large_vibrations).state : 0.0f;
      const float wg = id(washer_combined_gyro).has_state() ? id(washer_combined_gyro).state : 0.0f;
      const bool weak_activity = (wm >= 0.12f) || (wl >= 0.20f) || (wg >= 0.35f);

      const bool strong_start = id(washer_accel_flag_1).state || id(washer_gyro_flag_1).state;

      if (strong_start || weak_activity) {
        id(washer_last_activity_ms) = now;
      }

      if (!id(washer_cycle_started) && strong_start) {
        id(washer_cycle_started) = true;
        id(washer_cycle_start_ms) = now;
        id(washer_last_activity_ms) = now;
      }

      if (id(washer_cycle_started)) {
        if ((uint32_t) (now - id(washer_cycle_start_ms)) < min_cycle_ms) {
          return true;
        }
        if ((uint32_t) (now - id(washer_last_activity_ms)) < inter_phase_hold_ms) {
          return true;
        }

        id(washer_cycle_started) = false;
      }

      // Turn ON if either Accel Flag 1 OR Gyro Flag 1 is true
      if (strong_start) {
        return true;
      } else {
        return false;
      }
    filters:
      - delayed_off: 4min # Keep ON unless both flags have been OFF for 4 minutes      

