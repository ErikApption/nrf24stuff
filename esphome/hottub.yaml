esphome:
  name: hottub
esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino


wifi:
  ssid: "GrenoblePirates-2G"
  password: !secret wifi_password
  fast_connect: true

api:
  encryption:
    key: "fHli4zx/CLe2u9KxtFyls1/nNsw3TVnuTIXtFJEg4Yc="

logger:

ota:
  - platform: esphome
    password: "lrhottub1181"

# --- Deep Sleep ---
# Wake every 5 minutes, take readings, send, sleep again
deep_sleep:
  id: deep_sleep_control
  sleep_duration: 5min
  run_duration: 4s

# --- Dallas 1-Wire Bus ---
one_wire:
  - platform: gpio
    pin: GPIO4

binary_sensor:
  - platform: status
    name: "Hot Tub Sensor Wake Status"

sensor:
  # --- DS18B20 Temperature Probe ---
  # Takes a reading every 2s, averages 5 samples, then sends once
  - platform: dallas_temp
    name: "Hot Tub Temperature"
    id: hottub_temp
    update_interval: 1s
    on_value:
      then:
        - if:
            condition:
              and:
                - api.connected:
                - sensor.in_range:
                    id: hottub_temp
                    above: -55
                    below: 125
            then:
              - script.execute: go_to_sleep
    filters:
      - sliding_window_moving_average:
          window_size: 3
          send_every: 3

# --- Go to sleep after readings are sent ---
script:
  - id: go_to_sleep
    then:
      - logger.log: "Reading captured, powering off sensor and going to deep sleep"
      - delay: 2s
      - deep_sleep.enter: deep_sleep_control
