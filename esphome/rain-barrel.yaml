esphome:
  name: rain-barrel
  friendly_name: Rain Barrel Valve
  on_boot:
    priority: -100
    then:
      # Ensure valve is off on boot
      - switch.turn_off: valve_switch

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: "RTmDpSTtAQa5pk8xyYM2ibFHnjMuS68a41OMLqJAlo8="

ota:
  - platform: esphome
    password: !secret ota_password

logger:

# --- Outputs ---
# (No GPIO-driven outputs — LED is hardwired on 12V valve output)

# --- Valve Control (PWM MOSFET Trigger Module on GPIO4) ---
# Dual high-power MOSFET module switches 12V to the normally-closed valve.
# GPIO4 HIGH = MOSFET on = 12V to valve = valve opens
# GPIO4 LOW  = MOSFET off = no power = valve closes (spring return)
# LED is wired directly on the 12V output (lights when valve is powered)
switch:
  - platform: gpio
    pin: GPIO4
    name: "Ball Valve"
    id: valve_switch
    icon: "mdi:valve"
    restore_mode: ALWAYS_OFF

# --- Manual Toggle Button ---
binary_sensor:
  # Single toggle button — press to open, press again to close
  # Wired: GPIO5 → button → GND (internal pull-up holds HIGH, press pulls LOW)
  - platform: gpio
    pin:
      number: GPIO5
      inverted: true
      mode:
        input: true
        pullup: true
    name: "Valve Toggle Button"
    id: btn_toggle
    filters:
      - delayed_on: 50ms
    on_press:
      then:
        - switch.toggle: valve_switch

  # --- Water Level Sensors (XKC-Y25-NPN) ---
  - platform: gpio
    pin:
      number: GPIO7
      mode: INPUT
    name: "Water Level High"
    id: level_high
    device_class: moisture
    filters:
      - delayed_on: 500ms
      - delayed_off: 500ms

  - platform: gpio
    pin:
      number: GPIO6
      mode: INPUT
    name: "Water Level Mid"
    id: level_mid
    device_class: moisture
    filters:
      - delayed_on: 500ms
      - delayed_off: 500ms

# --- Text sensor for human-readable water level ---
text_sensor:
  - platform: template
    name: "Water Level"
    id: water_level_text
    lambda: |-
      if (id(level_high).state) return {"Full"};
      if (id(level_mid).state) return {"Mid"};
      return {"Low"};
    update_interval: 5s

# --- Solar Panel Voltage (ADC via voltage divider) ---
sensor:
  - platform: adc
    pin: GPIO0
    name: "Solar Panel Voltage"
    id: solar_voltage
    update_interval: 30s
    attenuation: 12db
    filters:
      # Scale ADC reading back to actual panel voltage
      # Divider ratio: 15 / (100 + 15) = 0.1304
      # Multiply by inverse: 1 / 0.1304 = 7.667
      - multiply: 7.667
    unit_of_measurement: "V"
    accuracy_decimals: 1
    device_class: voltage
