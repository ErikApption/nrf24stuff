esphome:
  name: cat-feeder-upstairs

substitutions:
  feeder_motor_pin: GPIO4
  feeder_stop_pin: GPIO5
  feeder_running_led_pin: GPIO10
  feeder_manual_button_pin: GPIO3

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_JTAG_BRIDGE_DISABLE: "y"

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "5VqSOKn3oeyZsu6nTdfOAxLMe4Lt+lnTa1BvxxE+MLs="

ota:
  - platform: esphome

wifi:
  ssid: "GrenoblePirates-2G"
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Cat-Feeder-Upstairs"
    password: "z57dUqYsyibo"

captive_portal:
    
# Example configuration entry
web_server:
  port: 8080

output:
  - platform: gpio
    id: feeder_running_led_output
    pin:
      number: ${feeder_running_led_pin}
      mode: output
      inverted: false

light:
  - platform: binary
    id: feeder_running_led
    internal: true
    output: feeder_running_led_output

globals:
  - id: feeder_started_active
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: feeder_seen_inactive
    type: bool
    restore_value: no
    initial_value: 'false'

script:
  - id: run_feeder_cycle
    mode: single
    then:
      - lambda: |-
          id(feeder_started_active) = id(feeder_stop).state;
          id(feeder_seen_inactive) = !id(feeder_started_active);
          ESP_LOGI("feeder_cycle", "Cycle start: stop switch is %s",
                   id(feeder_started_active) ? "ACTIVE" : "INACTIVE");
      - switch.turn_on: feeder_motor
      - wait_until:
          condition:
            lambda: |-
              if (!id(feeder_stop).state) {
                id(feeder_seen_inactive) = true;
              }
              return id(feeder_stop).state && id(feeder_seen_inactive);
          timeout: 30s
          check_interval: 10ms
      - if:
          condition:
            lambda: return id(feeder_stop).state && id(feeder_seen_inactive);
          then:
            - logger.log: "Cycle stop condition reached (release/press sequence complete)."
          else:
            - logger.log: "Cycle timeout (5s) reached; stopping motor."
      - switch.turn_off: feeder_motor

button:
  - platform: template
    name: "Feed Cat"
    icon: mdi:cat
    on_press:
      - script.execute: run_feeder_cycle
  
switch:
  - platform: gpio
    id: feeder_motor
    internal: true
    restore_mode: ALWAYS_OFF
    pin:
      number: ${feeder_motor_pin}
      mode: output
      inverted: false  # FQP30N06L direct drive: HIGH = motor ON
    on_turn_on:
      then:
        - light.turn_on: feeder_running_led
    on_turn_off:
      then:
        - light.turn_off: feeder_running_led

binary_sensor:
  - platform: gpio
    id: feeder_stop
    name: "Feeder Stop Switch"
    pin:
      number: ${feeder_stop_pin}
      mode: INPUT_PULLUP
      inverted: true
    on_press:
      then:
        - logger.log: "Feeder stop switch changed to ACTIVE"
        - switch.turn_off: feeder_motor
    on_release:
      then:
        - logger.log: "Feeder stop switch changed to INACTIVE"

  - platform: gpio
    id: feeder_manual_button
    name: "Feeder Manual Button"
    pin:
      number: ${feeder_manual_button_pin}
      mode: INPUT_PULLUP
      inverted: true
    filters:
      - delayed_on: 200ms
      - delayed_off: 200ms
    on_press:
      then:
        - logger.log: "Manual feed button pressed"
        - script.execute: run_feeder_cycle
