esphome:
  name: rain-barrel-valve
  friendly_name: Rain Barrel Valve
  on_boot:
    priority: -100
    then:
      # Power on sensors, wait for stabilization, read levels
      - output.turn_on: sensor_power
      - delay: 800ms
      - component.update: level_high
      - component.update: level_mid
      - component.update: level_low
      - component.update: water_level_text

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:

# --- Deep Sleep ---
deep_sleep:
  id: deep_sleep_control
  run_duration: 30s
  sleep_duration: 10min
  wakeup_pin:
    number: GPIO2
    allow_other_uses: true
  wakeup_pin_mode: KEEP_AWAKE

# --- Sensor Power MOSFET (GPIO3 controls N-FET gate → P-FET high-side switch) ---
output:
  - platform: gpio
    pin: GPIO3
    id: sensor_power

  - platform: gpio
    pin: GPIO4
    id: relay_open

  - platform: gpio
    pin: GPIO5
    id: relay_close

  # LED indicator — ON when valve is open
  - platform: gpio
    pin: GPIO10
    id: valve_led

# --- Manual Toggle Button ---
binary_sensor:
  # Single toggle button — press to open, press again to close
  - platform: gpio
    pin:
      number: GPIO2
      mode: INPUT
      allow_other_uses: true
    name: "Valve Toggle Button"
    id: btn_toggle
    filters:
      - delayed_on: 50ms
    on_press:
      then:
        - deep_sleep.prevent: deep_sleep_control
        - if:
            condition:
              lambda: 'return id(ball_valve).current_operation == COVER_OPERATION_IDLE && id(ball_valve).position == COVER_OPEN;'
            then:
              - cover.close: ball_valve
              - wait_until:
                  condition:
                    lambda: 'return id(ball_valve).current_operation == COVER_OPERATION_IDLE;'
              - output.turn_off: valve_led
            else:
              - cover.open: ball_valve
              - wait_until:
                  condition:
                    lambda: 'return id(ball_valve).current_operation == COVER_OPERATION_IDLE;'
              - output.turn_on: valve_led
        - deep_sleep.allow: deep_sleep_control

  # --- Water Level Sensors (XKC-Y25-NPN) ---
  - platform: gpio
    pin:
      number: GPIO6
      mode: INPUT
      inverted: true  # NPN pulls LOW when water detected
    name: "Water Level High"
    id: level_high
    device_class: moisture
    filters:
      - delayed_on: 500ms
      - delayed_off: 500ms

  - platform: gpio
    pin:
      number: GPIO7
      mode: INPUT
      inverted: true
    name: "Water Level Mid"
    id: level_mid
    device_class: moisture
    filters:
      - delayed_on: 500ms
      - delayed_off: 500ms

  - platform: gpio
    pin:
      number: GPIO8
      mode: INPUT
      inverted: true
    name: "Water Level Low"
    id: level_low
    device_class: moisture
    filters:
      - delayed_on: 500ms
      - delayed_off: 500ms

# --- Valve Control (cover with open/close/stop semantics) ---
cover:
  - platform: time_based
    name: "Ball Valve"
    id: ball_valve
    open_action:
      - output.turn_on: relay_open
      - output.turn_off: relay_close
    open_duration: 8s
    close_action:
      - output.turn_off: relay_open
      - output.turn_on: relay_close
    close_duration: 8s
    stop_action:
      - output.turn_off: relay_open
      - output.turn_off: relay_close
    has_built_in_endstop: true
    on_open:
      then:
        - output.turn_on: valve_led
    on_closed:
      then:
        - output.turn_off: valve_led

# --- Text sensor for human-readable water level ---
text_sensor:
  - platform: template
    name: "Water Level"
    id: water_level_text
    lambda: |-
      if (id(level_high).state) return {"Full"};
      if (id(level_mid).state) return {"Mid"};
      if (id(level_low).state) return {"Low"};
      return {"Empty"};
    update_interval: 5s

# --- Power off sensors before entering deep sleep ---
script:
  - id: prepare_sleep
    then:
      - output.turn_off: sensor_power
      - output.turn_off: relay_open
      - output.turn_off: relay_close
      - delay: 100ms
