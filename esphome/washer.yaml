globals:
  - id: washer_accel_baseline
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: dryer_coupling_compensation_factor
    type: float
    restore_value: yes
    initial_value: '0.75'
  - id: washer_micro_effective_trigger
    type: float
    restore_value: yes
    initial_value: '0.10'
  - id: washer_large_vibration_trigger
    type: float
    restore_value: yes
    initial_value: '0.30'
  - id: dryer_accel_baseline
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: baselines_initialized
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: dryer_cycle_started
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: washer_cycle_started
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: dryer_cycle_start_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: dryer_start_candidate_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: washer_cycle_start_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: washer_last_activity_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: washer_accel_prev
    type: float
    restore_value: no
    initial_value: '0.0'
  # Auto-calibration offsets (persist across reboots)
  - id: washer_offset_x
    type: float
    restore_value: yes
    initial_value: '0.0'
  - id: washer_offset_y
    type: float
    restore_value: yes
    initial_value: '0.0'
  - id: washer_offset_z
    type: float
    restore_value: yes
    initial_value: '0.0'
  - id: dryer_offset_x
    type: float
    restore_value: yes
    initial_value: '0.0'
  - id: dryer_offset_y
    type: float
    restore_value: yes
    initial_value: '0.0'
  - id: dryer_offset_z
    type: float
    restore_value: yes
    initial_value: '0.0'
  # Calibration accumulation state
  - id: cal_sample_count
    type: int
    restore_value: no
    initial_value: '0'
  - id: cal_sum_wx
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: cal_sum_wy
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: cal_sum_wz
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: cal_sum_dx
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: cal_sum_dy
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: cal_sum_dz
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: cal_active
    type: bool
    restore_value: no
    initial_value: 'false'

interval:
  - interval: 1s
    then:
      - lambda: |-
          // --- Calibration sampling ---
          if (id(cal_active)) {
            if (!id(washer_accel_x_raw).has_state() || !id(dryer_accel_x_raw).has_state()) {
              return;
            }
            id(cal_sum_wx) += id(washer_accel_x_raw).state;
            id(cal_sum_wy) += id(washer_accel_y_raw).state;
            id(cal_sum_wz) += id(washer_accel_z_raw).state;
            id(cal_sum_dx) += id(dryer_accel_x_raw).state;
            id(cal_sum_dy) += id(dryer_accel_y_raw).state;
            id(cal_sum_dz) += id(dryer_accel_z_raw).state;
            id(cal_sample_count) += 1;

            if (id(cal_sample_count) >= 30) {
              id(cal_active) = false;
              const int n = id(cal_sample_count);

              // Average raw readings at rest
              const float wax = id(cal_sum_wx) / n;
              const float way = id(cal_sum_wy) / n;
              const float waz = id(cal_sum_wz) / n;
              const float dax = id(cal_sum_dx) / n;
              const float day = id(cal_sum_dy) / n;
              const float daz = id(cal_sum_dz) / n;

              // Compute current magnitude
              const float w_mag = sqrt(wax*wax + way*way + waz*waz);
              const float d_mag = sqrt(dax*dax + day*day + daz*daz);

              // Scale factor to make magnitude = 9.81 (gravity)
              // offset = (9.81/mag - 1) * raw_axis  for each axis
              // This uniformly scales each axis so the vector length becomes 9.81
              const float w_scale = 9.81f / w_mag;
              const float d_scale = 9.81f / d_mag;

              // Offset = scaled_value - raw_value = raw*(scale-1)
              id(washer_offset_x) = wax * (w_scale - 1.0f);
              id(washer_offset_y) = way * (w_scale - 1.0f);
              id(washer_offset_z) = waz * (w_scale - 1.0f);
              id(dryer_offset_x) = dax * (d_scale - 1.0f);
              id(dryer_offset_y) = day * (d_scale - 1.0f);
              id(dryer_offset_z) = daz * (d_scale - 1.0f);

              // Reset baselines so they re-learn with new offsets
              id(baselines_initialized) = false;

              ESP_LOGI("cal", "Calibration complete (%d samples).", n);
              ESP_LOGI("cal", "Washer raw avg: x=%.3f y=%.3f z=%.3f mag=%.3f", wax, way, waz, w_mag);
              ESP_LOGI("cal", "Washer offsets: x=%.4f y=%.4f z=%.4f", id(washer_offset_x), id(washer_offset_y), id(washer_offset_z));
              ESP_LOGI("cal", "Dryer raw avg: x=%.3f y=%.3f z=%.3f mag=%.3f", dax, day, daz, d_mag);
              ESP_LOGI("cal", "Dryer offsets: x=%.4f y=%.4f z=%.4f", id(dryer_offset_x), id(dryer_offset_y), id(dryer_offset_z));
            }
            return;
          }

          // --- Normal baseline learning ---
          const float alpha = 0.03f;

          if (!id(washer_combined_acceleration_raw).has_state() || !id(dryer_combined_acceleration_raw).has_state()) {
            return;
          }

          const float w = id(washer_combined_acceleration_raw).state;
          const float d = id(dryer_combined_acceleration_raw).state;

          if (isnan(w) || isnan(d)) {
            return;
          }

          if (!id(baselines_initialized)) {
            id(washer_accel_baseline) = w;
            id(dryer_accel_baseline) = d;
            id(baselines_initialized) = true;
            return;
          }

          // Learn each baseline independently when that machine is off.
          const bool washer_on = id(washer_on_sensor).has_state() && id(washer_on_sensor).state;
          const bool dryer_on = id(dryer_on_sensor).has_state() && id(dryer_on_sensor).state;
          const bool dryer_dynamic = id(dryer_combined_gyro).has_state() && id(dryer_combined_gyro).state >= 0.9f;

          // Freeze washer baseline when signal is already elevated, even before formal detection.
          // Without this, the ~33s baseline time constant races against the 30s delayed_on on the
          // flags, causing the effective signal to decay below threshold before detection completes.
          const float w_delta = w - id(washer_accel_baseline);
          if (!washer_on && w_delta < 0.06f) {
            id(washer_accel_baseline) = id(washer_accel_baseline) * (1.0f - alpha) + w * alpha;
          }
          if (!dryer_on && !dryer_dynamic) {
            id(dryer_accel_baseline) = id(dryer_accel_baseline) * (1.0f - alpha) + d * alpha;
          }

sensor:
  - platform: mpu6050
    address: 0x68
    update_interval: 1s
    accel_x:
      id: washer_accel_x_raw
      name: "Washer Accel X Raw"
      internal: true
    accel_y:
      id: washer_accel_y_raw
      name: "Washer Accel Y Raw"
      internal: true
    accel_z:
      id: washer_accel_z_raw
      name: "Washer Accel Z Raw"
      internal: true
    gyro_x:
      id: washer_gyro_x
      name: "Washer Gyro X"
      internal: true
      filters:
      - offset: 2.07
    gyro_y:
      id: washer_gyro_y
      name: "Washer Gyro Y"
      internal: true
      filters:
      - offset: 0
    gyro_z:
      id: washer_gyro_z
      name: "Washer Gyro Z"
      internal: true
      filters:
      - offset: 0.73

  - platform: template
    id: washer_combined_gyro # Add an id here if it doesn't have one
    name: "Washer Combined Gyro"
    unit_of_measurement: "°/s"
    icon: "mdi:rotate-3d-variant"
    lambda: |-
      return abs(id(washer_gyro_x).state) + abs(id(washer_gyro_y).state) + abs(id(washer_gyro_z).state);
    update_interval: 1s
    filters:
      # - sliding_window_moving_average:
      #     window_size: 15
      #     send_every: 15
      #     send_first_at: 1
      - max:
          window_size: 10
          send_every: 10


  - platform: template
    id: washer_combined_acceleration_raw
    name: "Washer Combined Acceleration Raw"
    internal: true
    unit_of_measurement: "m/s²"
    icon: "mdi:axis-arrow"
    lambda: |-
      const float x = id(washer_accel_x_raw).state + id(washer_offset_x);
      const float y = id(washer_accel_y_raw).state + id(washer_offset_y);
      const float z = id(washer_accel_z_raw).state + id(washer_offset_z);
      return sqrt(x*x + y*y + z*z);
    update_interval: 1s

  - platform: template
    name: "Washer Combined Acceleration"
    id: washer_combined_acceleration
    unit_of_measurement: "m/s²"
    icon: "mdi:axis-arrow"
    lambda: |-
      const float x = id(washer_accel_x_raw).state + id(washer_offset_x);
      const float y = id(washer_accel_y_raw).state + id(washer_offset_y);
      const float z = id(washer_accel_z_raw).state + id(washer_offset_z);
      return sqrt(x*x + y*y + z*z);
    update_interval: 1s
    filters:
      - max:
          window_size: 10
          send_every: 10

  - platform: mpu6050
    address: 0x69
    update_interval: 1s
    accel_x:
      id: dryer_accel_x_raw
      name: "Dryer Accel X Raw"
      internal: true
    accel_y:
      id: dryer_accel_y_raw
      name: "Dryer Accel Y Raw"
      internal: true
    accel_z:
      id: dryer_accel_z_raw
      name: "Dryer Accel Z Raw"
      internal: true
    gyro_x:
      id: dryer_gyro_x
      name: "Dryer Gyro X"
      internal: true
      filters:
      - offset: -3.17
    gyro_y:
      id: dryer_gyro_y
      name: "Dryer Gyro Y"
      internal: true
      filters:
      - offset: 0.12
    gyro_z:
      id: dryer_gyro_z
      name: "Dryer Gyro Z"
      internal: true
      filters:
      - offset: 0.98

  - platform: template
    id: dryer_combined_gyro
    name: "Dryer Combined Gyro"
    internal: true
    unit_of_measurement: "°/s"
    icon: "mdi:rotate-3d-variant"
    lambda: |-
      return abs(id(dryer_gyro_x).state) + abs(id(dryer_gyro_y).state) + abs(id(dryer_gyro_z).state);
    update_interval: 1s
    filters:
      - max:
          window_size: 5
          send_every: 5
      

  - platform: template
    id: dryer_combined_acceleration_raw
    name: "Dryer Combined Acceleration Raw"
    internal: true
    unit_of_measurement: "m/s²"
    icon: "mdi:axis-arrow"
    lambda: |-
      const float x = id(dryer_accel_x_raw).state + id(dryer_offset_x);
      const float y = id(dryer_accel_y_raw).state + id(dryer_offset_y);
      const float z = id(dryer_accel_z_raw).state + id(dryer_offset_z);
      return sqrt(x*x + y*y + z*z);
    update_interval: 1s

  - platform: template
    id: dryer_combined_acceleration
    name: "Dryer Combined Acceleration"
    unit_of_measurement: "m/s²"
    icon: "mdi:axis-arrow"
    lambda: |-
      const float x = id(dryer_accel_x_raw).state + id(dryer_offset_x);
      const float y = id(dryer_accel_y_raw).state + id(dryer_offset_y);
      const float z = id(dryer_accel_z_raw).state + id(dryer_offset_z);
      return sqrt(x*x + y*y + z*z);
    update_interval: 1s
    filters:
      - max:
          window_size: 10
          send_every: 10

  - platform: template
    id: washer_micro_vibrations
    name: "Washer Micro Vibrations"
    unit_of_measurement: "m/s²"
    icon: "mdi:vibrate-off"
    lambda: |-
      if (!id(washer_combined_acceleration_raw).has_state()) {
        return 0.0f;
      }
      if (isnan(id(washer_accel_baseline))) {
        return 0.0f;
      }
      const float delta = id(washer_combined_acceleration_raw).state - id(washer_accel_baseline);
      return delta > 0.0f ? delta : 0.0f;
    update_interval: 1s
    filters:
      - max:
          window_size: 2
          send_every: 2

  - platform: template
    id: washer_large_vibrations
    name: "Washer Large Vibrations"
    unit_of_measurement: "m/s²"
    icon: "mdi:vibrate"
    lambda: |-
      if (!id(washer_combined_acceleration_raw).has_state()) {
        return 0.0f;
      }
      if (isnan(id(washer_accel_baseline))) {
        return 0.0f;
      }
      const float delta = id(washer_combined_acceleration_raw).state - id(washer_accel_baseline);
      return delta > 0.0f ? delta : 0.0f;
    update_interval: 1s
    filters:
      - max:
          window_size: 10
          send_every: 10

  - platform: template
    id: dryer_micro_vibrations
    name: "Dryer Micro Vibrations"
    unit_of_measurement: "m/s²"
    icon: "mdi:vibrate-off"
    lambda: |-
      if (!id(dryer_combined_acceleration_raw).has_state()) {
        return 0.0f;
      }
      if (isnan(id(dryer_accel_baseline))) {
        return 0.0f;
      }
      const float delta = id(dryer_combined_acceleration_raw).state - id(dryer_accel_baseline);
      return delta > 0.0f ? delta : 0.0f;
    update_interval: 1s
    filters:
      - max:
          window_size: 2
          send_every: 2

  - platform: template
    id: dryer_large_vibrations
    name: "Dryer Large Vibrations"
    unit_of_measurement: "m/s²"
    icon: "mdi:vibrate"
    lambda: |-
      if (!id(dryer_combined_acceleration_raw).has_state()) {
        return 0.0f;
      }
      if (isnan(id(dryer_accel_baseline))) {
        return 0.0f;
      }
      const float delta = id(dryer_combined_acceleration_raw).state - id(dryer_accel_baseline);
      return delta > 0.0f ? delta : 0.0f;
    update_interval: 1s
    filters:
      - max:
          window_size: 10
          send_every: 10

  - platform: template
    id: debug_washer_dryer_coupling_subtraction
    name: "Debug Washer Dryer Coupling Subtraction"
    internal: ${debug_metrics_internal}
    disabled_by_default: false
    entity_category: diagnostic
    unit_of_measurement: "m/s²"
    icon: "mdi:minus-circle-outline"
    lambda: |-
      if (!id(dryer_micro_vibrations).has_state()) {
        return 0.0f;
      }
      return id(dryer_micro_vibrations).state * id(dryer_coupling_compensation_factor);
    update_interval: 1s

  - platform: template
    id: debug_washer_micro_vibration_effective
    name: "Debug Washer Micro Vibration Effective"
    internal: ${debug_metrics_internal}
    disabled_by_default: false
    entity_category: diagnostic
    unit_of_measurement: "m/s²"
    icon: "mdi:tune-variant"
    lambda: |-
      if (!id(washer_micro_vibrations).has_state() || !id(dryer_micro_vibrations).has_state()) {
        return 0.0f;
      }
      const float wm = id(washer_micro_vibrations).state;
      const float dm = id(dryer_micro_vibrations).state;
      const float wm_comp = wm - (dm * id(dryer_coupling_compensation_factor));
      return wm_comp > 0.0f ? wm_comp : 0.0f;
    update_interval: 1s

  - platform: template
    id: debug_washer_micro_trigger_margin
    name: "Debug Washer Micro Trigger Margin"
    internal: ${debug_metrics_internal}
    disabled_by_default: false
    entity_category: diagnostic
    unit_of_measurement: "m/s²"
    icon: "mdi:chart-line-variant"
    lambda: |-
      if (!id(debug_washer_micro_vibration_effective).has_state()) {
        return 0.0f;
      }
      return id(debug_washer_micro_vibration_effective).state - id(washer_micro_effective_trigger);
    update_interval: 1s

  - platform: template
    id: debug_washer_large_trigger_margin
    name: "Debug Washer Large Trigger Margin"
    internal: ${debug_metrics_internal}
    disabled_by_default: false
    entity_category: diagnostic
    unit_of_measurement: "m/s²"
    icon: "mdi:chart-line-variant"
    lambda: |-
      if (!id(washer_large_vibrations).has_state()) {
        return 0.0f;
      }
      return id(washer_large_vibrations).state - id(washer_large_vibration_trigger);
    update_interval: 1s

  - platform: template
    id: washer_accel_jitter
    name: "Debug Washer Accel Jitter"
    internal: ${debug_metrics_internal}
    disabled_by_default: false
    entity_category: diagnostic
    unit_of_measurement: "m/s²"
    icon: "mdi:chart-scatter-plot"
    lambda: |-
      if (!id(washer_combined_acceleration_raw).has_state()) {
        return 0.0f;
      }
      const float curr = id(washer_combined_acceleration_raw).state;
      const float prev = id(washer_accel_prev);
      const float j = (prev == 0.0f) ? 0.0f : abs(curr - prev);
      id(washer_accel_prev) = curr;
      return j;
    update_interval: 1s
    filters:
      - max:
          window_size: 5
          send_every: 5

  - platform: template
    id: debug_washer_tuning_compensation_factor_sensor
    name: "Debug Washer Tuning Compensation Factor"
    internal: ${debug_metrics_internal}
    disabled_by_default: false
    entity_category: diagnostic
    icon: "mdi:knob"
    lambda: |-
      return id(dryer_coupling_compensation_factor);
    update_interval: 10s

  - platform: template
    id: debug_washer_tuning_micro_trigger_sensor
    name: "Debug Washer Tuning Micro Trigger"
    internal: ${debug_metrics_internal}
    disabled_by_default: false
    entity_category: diagnostic
    unit_of_measurement: "m/s²"
    icon: "mdi:knob"
    lambda: |-
      return id(washer_micro_effective_trigger);
    update_interval: 10s

  - platform: template
    id: debug_washer_tuning_large_trigger_sensor
    name: "Debug Washer Tuning Large Trigger"
    internal: ${debug_metrics_internal}
    disabled_by_default: false
    entity_category: diagnostic
    unit_of_measurement: "m/s²"
    icon: "mdi:knob"
    lambda: |-
      return id(washer_large_vibration_trigger);
    update_interval: 10s

  - platform: template
    id: washer_accel_baseline_sensor
    name: "Washer Accel Baseline"
    unit_of_measurement: "m/s²"
    icon: "mdi:chart-bell-curve"
    lambda: |-
      if (isnan(id(washer_accel_baseline))) {
        return 0.0f;
      }
      return id(washer_accel_baseline);
    update_interval: 5s

  - platform: template
    id: dryer_accel_baseline_sensor
    name: "Dryer Accel Baseline"
    unit_of_measurement: "m/s²"
    icon: "mdi:chart-bell-curve"
    lambda: |-
      if (isnan(id(dryer_accel_baseline))) {
        return 0.0f;
      }
      return id(dryer_accel_baseline);
    update_interval: 5s

  # Calibration offset sensors (exposed to HA for visibility)
  - platform: template
    id: washer_offset_x_sensor
    name: "Washer Offset X"
    entity_category: diagnostic
    unit_of_measurement: "m/s²"
    icon: "mdi:axis-x-arrow"
    lambda: |-
      return id(washer_offset_x);
    update_interval: 10s

  - platform: template
    id: washer_offset_y_sensor
    name: "Washer Offset Y"
    entity_category: diagnostic
    unit_of_measurement: "m/s²"
    icon: "mdi:axis-y-arrow"
    lambda: |-
      return id(washer_offset_y);
    update_interval: 10s

  - platform: template
    id: washer_offset_z_sensor
    name: "Washer Offset Z"
    entity_category: diagnostic
    unit_of_measurement: "m/s²"
    icon: "mdi:axis-z-arrow"
    lambda: |-
      return id(washer_offset_z);
    update_interval: 10s

  - platform: template
    id: dryer_offset_x_sensor
    name: "Dryer Offset X"
    entity_category: diagnostic
    unit_of_measurement: "m/s²"
    icon: "mdi:axis-x-arrow"
    lambda: |-
      return id(dryer_offset_x);
    update_interval: 10s

  - platform: template
    id: dryer_offset_y_sensor
    name: "Dryer Offset Y"
    entity_category: diagnostic
    unit_of_measurement: "m/s²"
    icon: "mdi:axis-y-arrow"
    lambda: |-
      return id(dryer_offset_y);
    update_interval: 10s

  - platform: template
    id: dryer_offset_z_sensor
    name: "Dryer Offset Z"
    entity_category: diagnostic
    unit_of_measurement: "m/s²"
    icon: "mdi:axis-z-arrow"
    lambda: |-
      return id(dryer_offset_z);
    update_interval: 10s



binary_sensor:
  - platform: template
    name: "Dryer On"
    id: dryer_on_sensor
    trigger_on_initial_state: true
    device_class: running # Optional: for better representation in Home Assistant
    lambda: |-
      const uint32_t min_cycle_ms = 20UL * 60UL * 1000UL;
      const uint32_t start_confirm_ms = 30UL * 1000UL;
      const uint32_t now = millis();
      const float DRYER_ACCEL_LARGE_TRIGGER = 0.25f;
      const float DRYER_ACCEL_MICRO_TRIGGER = 0.10f;
      const float DRYER_GYRO_TRIGGER = 1.40f;

      if (!id(dryer_large_vibrations).has_state() || !id(dryer_micro_vibrations).has_state() ||
          !id(washer_large_vibrations).has_state() || !id(washer_micro_vibrations).has_state() ||
          !id(dryer_combined_gyro).has_state()) {
        return false;
      }

      const float dl = id(dryer_large_vibrations).state;
      const float dm = id(dryer_micro_vibrations).state;
      const float wl = id(washer_large_vibrations).state;
      const float wm = id(washer_micro_vibrations).state;
      const float dg = id(dryer_combined_gyro).state;

      // Suppress dryer ON when washer clearly dominates the shared vibration.
      const bool coupled_from_washer = (wl >= 0.8f && wm >= 0.45f && wl > (dl * 1.2f));
      const bool strong_accel = (dl >= DRYER_ACCEL_LARGE_TRIGGER && dm >= DRYER_ACCEL_MICRO_TRIGGER);
      const bool strong_gyro = (dg >= DRYER_GYRO_TRIGGER && dm >= 0.05f);
      const bool strong_start = (strong_accel || strong_gyro) && !coupled_from_washer;

      if (strong_start) {
        if (id(dryer_start_candidate_ms) == 0) {
          id(dryer_start_candidate_ms) = now;
        }
      } else {
        id(dryer_start_candidate_ms) = 0;
      }

      const bool confirmed_start =
          (id(dryer_start_candidate_ms) != 0) &&
          ((uint32_t) (now - id(dryer_start_candidate_ms)) >= start_confirm_ms);

      if (!id(dryer_cycle_started) && confirmed_start) {
        id(dryer_cycle_started) = true;
        id(dryer_cycle_start_ms) = now;
      }

      if (id(dryer_cycle_started)) {
        if ((uint32_t) (now - id(dryer_cycle_start_ms)) < min_cycle_ms) {
          return true;
        }
        if (!strong_start) {
          id(dryer_cycle_started) = false;
        }
      }

      if (strong_start) {
        return true;
      } else {
        return false;
      }
    filters:
      - delayed_on: 30s
      - delayed_off: 2min          

  - platform: template
    name: "Accel Flag 1"
    id: washer_accel_flag_1
    trigger_on_initial_state: true
    device_class: running # Optional
    lambda: |-
      if (!id(washer_large_vibrations).has_state() || !id(washer_micro_vibrations).has_state() ||
          !id(dryer_large_vibrations).has_state() || !id(dryer_micro_vibrations).has_state()) {
        return false;
      }

      const float wl = id(washer_large_vibrations).state;
      const float wm = id(washer_micro_vibrations).state;
      const float dl = id(dryer_large_vibrations).state;
      const float dm = id(dryer_micro_vibrations).state;
      const float wj = id(washer_accel_jitter).has_state() ? id(washer_accel_jitter).state : 0.0f;
      // Remove shared vibration from dryer before checking washer micro activity.
      const float wm_comp = wm - (dm * id(dryer_coupling_compensation_factor));
      const float wm_effective = wm_comp > 0.0f ? wm_comp : 0.0f;

      // Suppress washer accel flag when dryer clearly dominates shared vibration.
      if (dl >= 0.9f && dm >= 0.5f && dl > (wl * 1.2f)) {
        return false;
      }

      // Baseline-relative path (may be blocked by baseline drift).
      const bool baseline_trigger = (wl >= id(washer_large_vibration_trigger) && wm_effective >= id(washer_micro_effective_trigger));
      // Jitter path: gated by minimum large vibration to prevent noise-only triggers.
      const float WASHER_JITTER_TRIGGER = 0.10f;
      const float WASHER_JITTER_LARGE_GATE = 0.25f;
      const bool jitter_trigger = (wj >= WASHER_JITTER_TRIGGER && wl >= WASHER_JITTER_LARGE_GATE);

      return baseline_trigger || jitter_trigger;
    filters:
      - delayed_on: 30s
      - delayed_off: 30s

  - platform: template
    name: "Gyro Flag 1"
    id: washer_gyro_flag_1
    trigger_on_initial_state: true
    device_class: running # Optional
    lambda: |-
      const float WASHER_GYRO_TRIGGER = 1.20f;
      const float WASHER_EFFECTIVE_MICRO_FOR_GYRO = 0.06f;

      if (!id(washer_large_vibrations).has_state() || !id(washer_micro_vibrations).has_state() ||
          !id(dryer_large_vibrations).has_state() || !id(dryer_micro_vibrations).has_state() ||
          !id(washer_combined_gyro).has_state()) {
        return false;
      }

      const float wl = id(washer_large_vibrations).state;
      const float wm = id(washer_micro_vibrations).state;
      const float dl = id(dryer_large_vibrations).state;
      const float dm = id(dryer_micro_vibrations).state;
      const float wm_comp = wm - (dm * id(dryer_coupling_compensation_factor));
      const float wm_effective = wm_comp > 0.0f ? wm_comp : 0.0f;

      // Suppress washer gyro flag when dryer clearly dominates shared vibration.
      if (dl >= 0.9f && dm >= 0.5f && dl > (wl * 1.2f)) {
        return false;
      }

      // Require both gyro and a little washer-specific vibration to avoid dryer-only coupling false positives.
      if (id(washer_combined_gyro).state >= WASHER_GYRO_TRIGGER && wm_effective >= WASHER_EFFECTIVE_MICRO_FOR_GYRO) {
        return true;
      } else {
        return false;
      }
    filters:
      - delayed_on: 30s
      
  - platform: template
    name: "Washer On"
    id: washer_on_sensor
    trigger_on_initial_state: true
    device_class: running # Optional
    lambda: |-
      const uint32_t min_cycle_ms = 20UL * 60UL * 1000UL;
      const uint32_t inter_phase_hold_ms = 2UL * 60UL * 1000UL;
      const uint32_t max_cycle_ms = 180UL * 60UL * 1000UL;
      const uint32_t now = millis();

      if (!id(washer_accel_flag_1).has_state() || !id(washer_gyro_flag_1).has_state()) {
        return false;
      }

      const float wm = id(washer_micro_vibrations).has_state() ? id(washer_micro_vibrations).state : 0.0f;
      const float dm = id(dryer_micro_vibrations).has_state() ? id(dryer_micro_vibrations).state : 0.0f;
      const float wl = id(washer_large_vibrations).has_state() ? id(washer_large_vibrations).state : 0.0f;
      const float wg = id(washer_combined_gyro).has_state() ? id(washer_combined_gyro).state : 0.0f;
      const float dl = id(dryer_large_vibrations).has_state() ? id(dryer_large_vibrations).state : 0.0f;
      const float wm_comp = wm - (dm * id(dryer_coupling_compensation_factor));
      const float wm_effective = wm_comp > 0.0f ? wm_comp : 0.0f;
      const bool dryer_dominant = (dl >= 0.9f && dm >= 0.5f && dl > (wl * 1.2f));

      // Weak activity must show real washer motion, not just sensor noise.
      // Require at least two of three signals above raised thresholds to refresh hold.
      // When dryer is confirmed ON, suppress weak_activity entirely — coupled
      // vibration easily fakes 2-of-3 signals and prevents cycle end.
      const bool dryer_running = id(dryer_on_sensor).has_state() && id(dryer_on_sensor).state;
      const bool wm_active = (wm_effective >= 0.25f);
      const bool wl_active = (wl >= 0.55f);
      const bool wg_active = (wg >= 1.20f);
      const int activity_signals = (int)wm_active + (int)wl_active + (int)wg_active;
      const bool weak_activity = !dryer_dominant && !dryer_running && (activity_signals >= 2);

      // Require accel flag with at least some gyro activity, OR gyro flag with
      // some accel activity. This prevents dryer-only coupling (accel without gyro)
      // from triggering, while not requiring both flags to sustain for 30s.
      const float wg_now = id(washer_combined_gyro).has_state() ? id(washer_combined_gyro).state : 0.0f;
      const bool accel_with_gyro = id(washer_accel_flag_1).state && (wg_now >= 0.60f);
      const bool gyro_with_accel = id(washer_gyro_flag_1).state && (wm_effective >= 0.06f || wl >= 0.20f);
      const bool strong_start = accel_with_gyro || gyro_with_accel;

      if (strong_start || weak_activity) {
        id(washer_last_activity_ms) = now;
      }

      if (!id(washer_cycle_started) && strong_start) {
        id(washer_cycle_started) = true;
        id(washer_cycle_start_ms) = now;
        id(washer_last_activity_ms) = now;
      }

      if (id(washer_cycle_started)) {
        // Hard cap: no cycle can exceed 3 hours regardless of activity.
        if ((uint32_t)(now - id(washer_cycle_start_ms)) >= max_cycle_ms) {
          id(washer_cycle_started) = false;
          return false;
        }
        if ((uint32_t)(now - id(washer_cycle_start_ms)) < min_cycle_ms) {
          return true;
        }
        if ((uint32_t)(now - id(washer_last_activity_ms)) < inter_phase_hold_ms) {
          return true;
        }

        id(washer_cycle_started) = false;
      }

      // Turn ON if either Accel Flag 1 OR Gyro Flag 1 is true
      if (strong_start) {
        return true;
      } else {
        return false;
      }
    filters:
      - delayed_off: 2min # Keep ON unless both flags have been OFF for 2 minutes      

button:
  - platform: template
    name: "Calibrate Accelerometers"
    id: calibrate_button
    icon: "mdi:compass-outline"
    entity_category: config
    on_press:
      - lambda: |-
          // Start calibration: collect 30 samples over 30 seconds
          id(cal_sample_count) = 0;
          id(cal_sum_wx) = 0.0f;
          id(cal_sum_wy) = 0.0f;
          id(cal_sum_wz) = 0.0f;
          id(cal_sum_dx) = 0.0f;
          id(cal_sum_dy) = 0.0f;
          id(cal_sum_dz) = 0.0f;
          id(cal_active) = true;
          ESP_LOGI("cal", "Calibration started - collecting 30 samples. Keep machines OFF and still.");

  - platform: template
    name: "Clear Accel Offsets"
    id: clear_offsets_button
    icon: "mdi:eraser"
    entity_category: config
    on_press:
      - lambda: |-
          id(washer_offset_x) = 0.0f;
          id(washer_offset_y) = 0.0f;
          id(washer_offset_z) = 0.0f;
          id(dryer_offset_x) = 0.0f;
          id(dryer_offset_y) = 0.0f;
          id(dryer_offset_z) = 0.0f;
          id(baselines_initialized) = false;
          ESP_LOGI("cal", "All accel offsets cleared to zero.");

