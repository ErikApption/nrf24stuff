esphome:
  name: hottub
  on_boot:
    priority: 800
    then:
      - switch.turn_on: sensor_power
      - delay: 1200ms  # Ensure DS18B20 is fully powered before first conversion

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

# --- DS18B20 power control via GPIO ---
switch:
  - platform: gpio
    pin: GPIO3
    id: sensor_power
    internal: true
    restore_mode: ALWAYS_ON

logger:
  level: DEBUG

wifi:
  ssid: "GrenoblePirates-2G"
  password: !secret wifi_password
  fast_connect: true

api:
  encryption:
    key: "fHli4zx/CLe2u9KxtFyls1/nNsw3TVnuTIXtFJEg4Yc="

ota:
  - platform: esphome
    password: "lrhottub1181"

# --- Dallas 1-Wire Bus ---
one_wire:
  - platform: gpio
    pin: GPIO4

sensor:
  # --- DS18B20 Temperature Probe ---
  # Takes a reading every 2s, averages 5 samples, then sends once
  - platform: dallas_temp
    name: "Hot Tub Temperature"
    id: hottub_temp
    update_interval: 2s
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 5

  # --- Battery Voltage (ADC) ---
  - platform: adc
    pin: GPIO2
    name: "Hot Tub Battery Voltage"
    id: battery_voltage
    update_interval: 2s
    attenuation: 12db
    filters:
      # Adjust multiplier for your voltage divider ratio
      # Example: 2:1 divider (100k + 100k) → multiply by 2
      - multiply: 2.0
      - sliding_window_moving_average:
          window_size: 5
          send_every: 5
